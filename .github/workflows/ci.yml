name: CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'app/**'
      - 'component/**'
      - 'connection/**'
      - 'sonar-project.properties'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'app/**'
      - 'component/**'
      - 'connection/**'
      - 'sonar-project.properties'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 0: Type-check ───────────────────────────────────────────────────────
  # Pre-hook gates are bypassable; enforce type safety in CI as well.
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            component/package-lock.json
            connection/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix app &
          npm ci --prefix component &
          npm ci --prefix connection &
          wait

      - name: Type-check component
        working-directory: component
        run: npx tsc --noEmit

      - name: Type-check connection
        working-directory: connection
        run: npx tsc --noEmit

      - name: Type-check app
        working-directory: app
        run: npx tsc --noEmit

  # ── Job 1: Unit & integration tests with coverage ──────────────────────────
  # All three packages run in parallel within a single job.
  # Connection integration tests use GitHub service containers.
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: neoboard_test
          POSTGRES_PASSWORD: neoboard_test
          POSTGRES_DB: neoboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/neoboard123
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p neoboard123 'RETURN 1'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            component/package-lock.json
            connection/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix app &
          npm ci --prefix component &
          npm ci --prefix connection &
          wait

      - name: Run all tests in parallel
        run: |
          cd app && NODE_ENV=test npm run test:coverage &
          APP_PID=$!
          cd component && npm run test:coverage &
          COMP_PID=$!
          cd connection && npm run test:coverage &
          CONN_PID=$!

          FAIL=0
          wait $APP_PID  || FAIL=1
          wait $COMP_PID || FAIL=1
          wait $CONN_PID || FAIL=1
          exit $FAIL
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: '5432'
          POSTGRES_USER: neoboard_test
          POSTGRES_PASSWORD: neoboard_test
          POSTGRES_DB: neoboard_test
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: neoboard123

      - name: Upload unit coverage
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: unit-coverage
          retention-days: 1
          path: |
            app/coverage/lcov.info
            component/coverage/lcov.info
            connection/coverage/lcov.info

  # ── Job 2: E2E tests with coverage ─────────────────────────────────────────
  # Playwright + Testcontainers. Runs in parallel with unit-tests.
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            component/package-lock.json
            connection/package-lock.json

      - name: Install dependencies + pre-pull container images
        run: |
          npm ci --prefix connection &
          npm ci --prefix component  &
          npm ci --prefix app        &
          docker pull postgres:16-alpine  &
          docker pull neo4j:5-community   &
          wait

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: app
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cached browsers)
        working-directory: app
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: app/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('app/src/**/*.ts', 'app/src/**/*.tsx', 'app/package-lock.json') }}
          restore-keys: |
            nextjs-${{ runner.os }}-

      - name: Build Next.js
        working-directory: app
        run: npx next build
        env:
          CI: 'true'
          E2E_COVERAGE: '1'

      - name: Run E2E tests
        working-directory: app
        run: npx playwright test
        env:
          CI: 'true'
          E2E_COVERAGE: '1'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          retention-days: 14
          path: |
            app/playwright-report/
            app/test-results/

      - name: Upload E2E coverage
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: e2e-coverage
          retention-days: 1
          path: app/coverage-e2e/lcov.info
          if-no-files-found: warn

  # ── Job 3: SonarCloud scan (no test execution) ─────────────────────────────
  # Downloads coverage artifacts from unit-tests + e2e and runs the scan.
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: [typecheck, unit-tests, e2e]
    if: ${{ !cancelled() }}
    timeout-minutes: 10

    permissions:
      actions: read
      contents: read
      pull-requests: read
      statuses: write

    steps:
      - name: Checkout (full history for blame)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage
        continue-on-error: true

      - name: Download E2E coverage
        uses: actions/download-artifact@v4
        with:
          name: e2e-coverage
          path: app/coverage-e2e
        continue-on-error: true

      - name: List coverage files
        run: find . -name "lcov.info" -type f 2>/dev/null || echo "No lcov.info files found"

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
